name: CI — Test, Build, Archive 

on: push: branches: [ main, master ] pull_request: branches: [ main, master ] 

permissions: contents: read packages: write id-token: write 

jobs: test-and-build: runs-on: ubuntu-latest env: PYTHONUNBUFFERED: 1 PIP_DISABLE_PIP_VERSION_CHECK: "1" steps: - name: Checkout uses: actions/checkout@v4 

 - name: Set up Python 3.11 
    uses: actions/setup-python@v4 
    with: 
      python-version: "3.11" 
 
  - name: Cache pip 
    uses: actions/cache@v4 
    with: 
      path: ~/.cache/pip 
      key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }} 
      restore-keys: | 
        ${{ runner.os }}-pip- 
 
  - name: Install dependencies 
    run: | 
      python -m pip install --upgrade pip 
      pip install -r requirements.txt 
 
  - name: Run tests 
    run: | 
      pytest -q 
 
  - name: Build Docker image 
    if: success() 
    uses: docker/build-push-action@v5 
    with: 
      context: . 
      push: false 
      tags: | 
        ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }} 
        ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest 
 
  - name: Create archive artifact (tar.gz + zip) 
    run: | 
      mkdir -p dist 
      ./scripts/build_archive.sh --no-docker --output-dir dist 
      ls -la dist 
 
  - name: Upload archive artifact 
    uses: actions/upload-artifact@v4 
    with: 
      name: policy-compare-archive 
      path: dist/*.tar.gz,dist/*.zip 
 
  - name: Push Docker image to GitHub Container Registry (optional) 
    if: ${{ secrets.GITHUB_TOKEN != '' }} 
    uses: docker/build-push-action@v5 
    with: 
      context: . 
      push: true 
      tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }} 
      cache-from: type=gha 